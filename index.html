<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="shortcut icon" href="../assets/img/icon-url.png" type="image/png">
   <link rel="stylesheet" href="path/to/font-awesome/css/font-awesome.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <title>Login Recomeço +</title>
</head>
<body>
<main class="container">
 <!-- Lado Esquerdo -->

<section class="left">

<img src="../assets/img/logo-recomeco.png" class="logo">

<h1>
 Bem-vindo
<span>de volta!</span>
</h1>

<p>
Faça login ou crie sua conta gratuita e
garanta uma vida financeira mais organizada.
</p>
<img src="../assets/img/planta-grafico.png" class="plant">
</section>

<!-- Lado Direito -->

<section class="right">
<h2>Entrar</h2>
<span class="subtitle">
Use seu e-mail e senha para acessar sua conta
</span>
<form>
<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="E-mail" required>
</div>
 <div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" placeholder="Digite sua senha">
<i class="fa-solid fa-eye"></i>
</div>
<div class="options">
<label>
<input type="checkbox" checked>
Lembrar de mim
</label>
<a href="#">Esqueci minha senha</a>
</div>
<a href="../index.html" class="btn-entrar">
Entrar
</a>
</form>
<p class="register">
Não tem uma conta?
<a href="#">Cadastre-se</a>
 </p>
</section>
</main>
</body>
</html>
